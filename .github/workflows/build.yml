name: build

# Builds the Elara Tauri desktop app on Windows and publishes the installer.
#
# NOTE: The Python backend (elara-backend.exe) is NOT bundled here. It is built
# separately as a Tauri "sidecar" (see scripts/build-sidecar.ps1) because it
# pulls in whisper + kokoro and a ~340 MB model download that is impractical to
# fetch in CI. This workflow proves the frontend + Rust shell build and produces
# the installer for the app itself; wire in the sidecar for a fully offline
# distributable.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Needed so tauri-action can create the GitHub Release and upload installers.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend tests
        run: pnpm test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a v* tag push this creates a GitHub Release with the installers
          # attached. On branch pushes / PRs it just builds and uploads artifacts.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Elara {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      - name: Upload installer artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: elara-windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
