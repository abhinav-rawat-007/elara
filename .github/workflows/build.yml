name: build

# Builds the Elara Tauri desktop app on Windows, bundles the Python backend as a
# sidecar, and publishes the installer.
#
# The backend is frozen into elara-backend.exe with PyInstaller and staged as a
# Tauri sidecar so the shipped app runs on machines without Python. The Kokoro
# TTS model files (~340 MB) are NOT bundled — the backend downloads them once at
# first run into %APPDATA%\Elara\models (see backend/paths.py), so voice works
# after that one-time fetch.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Needed so tauri-action can create the GitHub Release and upload installers.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend tests
        run: pnpm test

      # --- Python backend sidecar -------------------------------------------
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pyinstaller

      - name: Build backend sidecar (PyInstaller)
        working-directory: backend
        run: pyinstaller --noconfirm --clean elara-backend.spec

      - name: Stage sidecar for Tauri
        shell: pwsh
        run: |
          $triple = (rustc -Vv | Select-String '^host:').ToString().Split(' ')[1]
          $dest = "src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "backend/dist/elara-backend.exe" "$dest/elara-backend-$triple.exe" -Force
          Write-Host "Staged sidecar: $dest/elara-backend-$triple.exe"
      # ----------------------------------------------------------------------

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Merge the sidecar config so the frozen backend is bundled into the
          # installer. The base tauri.conf.json intentionally omits externalBin
          # so `pnpm tauri dev` keeps working without building the sidecar first.
          args: --config src-tauri/tauri.sidecar.conf.json
          # On a v* tag push this creates a GitHub Release with the installers
          # attached. On branch pushes / PRs it just builds and uploads artifacts.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Elara {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      - name: Upload installer artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: elara-windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
